<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>เครื่องคำนวณกำไร · คลาสมวยไทย</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500;600&family=IBM+Plex+Sans+Thai:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">

<style>
  :root {
    --paper:   #F1F2EF;
    --card:    #FFFFFF;
    --rule:    #E2E4DE;
    --rule-2:  #C7CAC2;
    --ink:     #191C19;
    --muted:   #6B706A;
    --red:     #BE1E2D;
    --red-bg:  #FCEEEF;
    --blue:    #1E3A6B;
    --blue-bg: #EEF1F7;
    --gold:    #A67C15;

    --sans: 'IBM Plex Sans Thai', 'Noto Sans SC', system-ui, -apple-system, sans-serif;
    --disp: 'Kanit', 'Noto Sans SC', var(--sans);
    --mono: 'IBM Plex Mono', ui-monospace, 'Noto Sans SC', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: var(--sans);
    font-size: 15px;
    line-height: 1.6;
    padding: 26px 18px 56px;
    -webkit-font-smoothing: antialiased;
  }
  body.zh { font-size: 14.5px; }

  .wrap { max-width: 1120px; margin: 0 auto; }

  /* ============ SPLASH ============ */
  #splash {
    position: fixed; inset: 0; z-index: 50;
    background: var(--paper);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 24px; text-align: center;
  }
  #splash.gone { display: none; }

  .sp-mark {
    font-family: var(--mono);
    font-size: 11px; letter-spacing: .22em;
    text-transform: uppercase; color: var(--muted);
    margin-bottom: 14px;
  }
  .sp-title {
    font-family: var(--disp); font-weight: 600;
    font-size: clamp(24px, 5vw, 38px);
    line-height: 1.2; margin-bottom: 8px;
  }
  .sp-sub { color: var(--muted); font-size: 14px; margin-bottom: 34px; }

  .sp-picks { display: flex; gap: 14px; flex-wrap: wrap; justify-content: center; }

  .sp-btn {
    width: 168px; padding: 24px 18px;
    background: var(--card);
    border: 1px solid var(--rule-2);
    border-radius: 4px;
    cursor: pointer; text-align: center;
    font-family: var(--sans);
    transition: border-color .15s, transform .15s;
    border-top-width: 3px;
  }
  .sp-btn:hover { transform: translateY(-2px); }
  .sp-btn:focus-visible { outline: 2px solid var(--blue); outline-offset: 3px; }
  .sp-btn.th { border-top-color: var(--red); }
  .sp-btn.zh { border-top-color: var(--blue); }
  .sp-btn.th:hover { border-color: var(--red); }
  .sp-btn.zh:hover { border-color: var(--blue); }

  .sp-btn-lang { font-family: var(--disp); font-size: 22px; font-weight: 500; }
  .sp-btn-note { font-size: 12px; color: var(--muted); margin-top: 4px; }

  /* ============ HEADER ============ */
  .masthead {
    display: flex; justify-content: space-between;
    align-items: flex-end; gap: 18px;
    border-bottom: 1px solid var(--rule-2);
    padding-bottom: 16px; margin-bottom: 24px;
  }
  .eyebrow {
    font-family: var(--mono); font-size: 10px;
    letter-spacing: .2em; text-transform: uppercase;
    color: var(--gold); margin-bottom: 5px;
  }
  h1 {
    font-family: var(--disp); font-weight: 600;
    font-size: clamp(23px, 3.6vw, 34px);
    line-height: 1.15;
  }
  .sub { color: var(--muted); font-size: 13.5px; margin-top: 5px; max-width: 62ch; }

  .switch { display: flex; border: 1px solid var(--rule-2); border-radius: 3px; overflow: hidden; flex: none; }
  .switch button {
    font-family: var(--sans); font-size: 13px;
    padding: 6px 13px; border: 0; cursor: pointer;
    background: var(--card); color: var(--muted);
  }
  .switch button.on { background: var(--ink); color: var(--paper); }
  .switch button:focus-visible { outline: 2px solid var(--blue); outline-offset: -2px; }

  /* ============ LAYOUT ============ */
  .grid { display: grid; grid-template-columns: 316px 1fr; gap: 20px; align-items: start; }
  @media (max-width: 880px) { .grid { grid-template-columns: 1fr; } }

  .panel {
    background: var(--card);
    border: 1px solid var(--rule);
    border-radius: 4px; padding: 19px;
  }
  .panel + .panel { margin-top: 16px; }

  .panel-title {
    font-family: var(--mono); font-size: 10px;
    letter-spacing: .16em; text-transform: uppercase;
    color: var(--muted);
    padding-bottom: 11px; margin-bottom: 16px;
    border-bottom: 1px solid var(--rule);
  }

  /* ============ CONTROLS ============ */
  .ctrl { margin-bottom: 19px; }
  .ctrl:last-child { margin-bottom: 0; }
  .ctrl-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; gap: 8px; }
  .ctrl-label { font-size: 13.5px; font-weight: 500; }
  .ctrl-val { font-family: var(--mono); font-size: 15px; font-weight: 500; color: var(--blue); white-space: nowrap; }
  .ctrl-val small { color: var(--muted); font-size: 11px; margin-left: 2px; }
  .ctrl-note { font-size: 11.5px; color: var(--muted); margin-top: 5px; line-height: 1.45; }
  .ctrl-note.warn { color: var(--red); }

  input[type=range] {
    -webkit-appearance: none; appearance: none;
    width: 100%; height: 18px; background: transparent; cursor: pointer; display: block;
  }
  input[type=range]::-webkit-slider-runnable-track { height: 2px; background: var(--rule-2); }
  input[type=range]::-moz-range-track { height: 2px; background: var(--rule-2); }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 13px; height: 13px; margin-top: -5.5px;
    border-radius: 50%; background: var(--blue); border: 0;
  }
  input[type=range]::-moz-range-thumb { width: 13px; height: 13px; border: 0; border-radius: 50%; background: var(--blue); }
  input[type=range]:focus-visible { outline: 2px solid var(--blue); outline-offset: 3px; }

  /* ============ DAY STRIP : signature ============ */
  .strip-intro { font-size: 13px; color: var(--muted); margin-bottom: 13px; }
  .strip-intro b { color: var(--ink); font-weight: 500; }

  .strip { display: flex; gap: 7px; }
  .round {
    flex: 1; min-width: 0;
    border: 1px solid var(--rule);
    border-top: 3px solid var(--rule-2);
    border-radius: 3px; padding: 11px 9px;
    background: var(--paper); position: relative;
    animation: pop .26s ease-out both;
  }
  @keyframes pop { from { opacity: 0; transform: translateY(5px); } }
  @media (prefers-reduced-motion: reduce) { .round { animation: none; } }
  .round.first { border-top-color: var(--red); background: var(--red-bg); }

  .round-no { font-family: var(--mono); font-size: 10px; letter-spacing: .08em; color: var(--muted); margin-bottom: 7px; }
  .round-net { font-family: var(--mono); font-size: 16px; font-weight: 500; color: var(--blue); line-height: 1.2; }
  .round-line { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-top: 4px; }
  .round-line.gate { color: var(--red); }

  .gate-tag {
    position: absolute; top: -3px; right: -1px;
    background: var(--red); color: #fff;
    font-family: var(--mono); font-size: 9px;
    letter-spacing: .05em; padding: 2px 5px; border-radius: 0 0 0 3px;
  }

  .strip-foot {
    display: flex; justify-content: space-between; gap: 12px; flex-wrap: wrap;
    font-family: var(--mono); font-size: 11px; color: var(--muted);
    border-top: 1px dashed var(--rule-2); padding-top: 10px; margin-top: 12px;
  }
  .strip-foot b { color: var(--blue); font-weight: 500; }

  /* ============ LEDGER ============ */
  .ledger { width: 100%; border-collapse: collapse; font-family: var(--mono); font-size: 13px; }
  .ledger td { padding: 8px 0; border-bottom: 1px solid var(--rule); vertical-align: baseline; }
  .ledger td:first-child { color: var(--muted); font-family: var(--sans); font-size: 13px; padding-right: 12px; }
  .ledger td:last-child { text-align: right; font-variant-numeric: tabular-nums; white-space: nowrap; }
  .ledger tr.neg td:last-child { color: var(--red); }
  .ledger tr.plus td:last-child { color: var(--gold); }
  .ledger tr.sum td { border-bottom: 0; border-top: 2px solid var(--ink); padding-top: 12px; }
  .ledger tr.sum td:first-child { color: var(--ink); font-weight: 600; font-size: 14px; }
  .ledger tr.sum td:last-child { color: var(--blue); font-size: 17px; font-weight: 500; }
  .ledger tr.hide { display: none; }

  /* ============ PAYOUT ============ */
  .payout {
    background: var(--blue); color: #fff;
    border-radius: 4px; padding: 22px; text-align: center; margin-top: 16px;
  }
  .payout-label {
    font-family: var(--mono); font-size: 10px;
    letter-spacing: .16em; text-transform: uppercase; opacity: .72;
  }
  .payout-num {
    font-family: var(--disp); font-weight: 600;
    font-size: clamp(34px, 7vw, 52px); line-height: 1.1;
    margin: 5px 0 2px; font-variant-numeric: tabular-nums;
  }
  .payout-unit { font-size: 12.5px; opacity: .72; }

  /* ============ STATS ============ */
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 9px; margin-top: 16px; }
  @media (max-width: 720px) { .stats { grid-template-columns: repeat(2, 1fr); } }

  .stat { background: var(--card); border: 1px solid var(--rule); border-radius: 4px; padding: 13px; }
  .stat-k { font-size: 11.5px; color: var(--muted); margin-bottom: 4px; line-height: 1.35; }
  .stat-v { font-family: var(--mono); font-size: 20px; font-weight: 500; font-variant-numeric: tabular-nums; }
  .stat-v.good { color: var(--blue); }
  .stat-sub { font-size: 11px; color: var(--muted); margin-top: 3px; }

  /* ============ COMPARE ============ */
  .cmp-row {
    display: grid; grid-template-columns: 1fr auto; gap: 14px;
    align-items: center; padding: 12px 0; border-bottom: 1px solid var(--rule);
  }
  .cmp-row:last-of-type { border-bottom: 0; }
  .cmp-k { font-size: 13.5px; }
  .cmp-k span { display: block; font-size: 11.5px; color: var(--muted); margin-top: 2px; }
  .cmp-v { font-family: var(--mono); font-size: 17px; font-weight: 500; font-variant-numeric: tabular-nums; white-space: nowrap; }
  .cmp-v.dim { color: var(--muted); }
  .cmp-v.good { color: var(--blue); }

  .verdict {
    background: var(--blue-bg); border-left: 3px solid var(--blue);
    padding: 13px 15px; margin-top: 14px; font-size: 13.5px; line-height: 1.6; border-radius: 0 3px 3px 0;
  }
  .verdict b { color: var(--blue); font-weight: 600; }
  .verdict.alert { background: var(--red-bg); border-left-color: var(--red); }
  .verdict.alert b { color: var(--red); }

  .foot {
    margin-top: 26px; padding-top: 16px;
    border-top: 1px solid var(--rule-2);
    font-size: 12px; color: var(--muted); line-height: 1.7;
  }
  .foot b { color: var(--ink); font-weight: 600; }
</style>
</head>
<body>

<!-- ============ SPLASH ============ -->
<div id="splash">
  <div class="sp-mark">Bangkok · Muay Thai · P&amp;L</div>
  <div class="sp-title">เครื่องคำนวณกำไร<br>泰拳课利润计算器</div>
  <div class="sp-sub">เลือกภาษา · 选择语言</div>
  <div class="sp-picks">
    <button class="sp-btn th" data-lang="th">
      <div class="sp-btn-lang">ไทย</div>
      <div class="sp-btn-note">ภาษาไทย</div>
    </button>
    <button class="sp-btn zh" data-lang="zh">
      <div class="sp-btn-lang">中文</div>
      <div class="sp-btn-note">简体中文</div>
    </button>
  </div>
</div>

<div class="wrap">

  <div class="masthead">
    <div>
      <div class="eyebrow">Bangkok · Muay Thai · P&amp;L</div>
      <h1 id="t-title"></h1>
      <div class="sub" id="t-sub"></div>
    </div>
    <div class="switch">
      <button id="sw-th" data-lang="th">ไทย</button>
      <button id="sw-zh" data-lang="zh">中文</button>
    </div>
  </div>

  <div class="grid">

    <!-- ============ CONTROLS ============ -->
    <div>
      <div class="panel">
        <div class="panel-title" id="t-p-core"></div>

        <div class="ctrl">
          <div class="ctrl-head"><span class="ctrl-label" id="t-c-price"></span><span class="ctrl-val" id="v-price"></span></div>
          <input type="range" id="price" min="390" max="1500" step="10" value="690">
        </div>

        <div class="ctrl">
          <div class="ctrl-head"><span class="ctrl-label" id="t-c-booked"></span><span class="ctrl-val" id="v-booked"></span></div>
          <input type="range" id="booked" min="1" max="12" step="1" value="6">
          <div class="ctrl-note" id="t-n-booked"></div>
        </div>

        <div class="ctrl">
          <div class="ctrl-head"><span class="ctrl-label" id="t-c-noshow"></span><span class="ctrl-val" id="v-noshow"></span></div>
          <input type="range" id="noshow" min="0" max="30" step="1" value="12">
          <div class="ctrl-note" id="t-n-noshow"></div>
        </div>

        <div class="ctrl">
          <div class="ctrl-head"><span class="ctrl-label" id="t-c-perday"></span><span class="ctrl-val" id="v-perday"></span></div>
          <input type="range" id="perday" min="1" max="4" step="1" value="3">
          <div class="ctrl-note" id="t-n-perday"></div>
        </div>

        <div class="ctrl">
          <div class="ctrl-head"><span class="ctrl-label" id="t-c-days"></span><span class="ctrl-val" id="v-days"></span></div>
          <input type="range" id="days" min="1" max="6" step="1" value="3">
          <div class="ctrl-note" id="t-n-days"></div>
        </div>

        <div class="ctrl">
          <div class="ctrl-head"><span class="ctrl-label" id="t-c-fee"></span><span class="ctrl-val" id="v-fee"></span></div>
          <input type="range" id="fee" min="0" max="400" step="20" value="200">
          <div class="ctrl-note" id="t-n-fee"></div>
        </div>

        <div class="ctrl">
          <div class="ctrl-head"><span class="ctrl-label" id="t-c-team"></span><span class="ctrl-val" id="v-team"></span></div>
          <input type="range" id="team" min="2" max="5" step="1" value="3">
        </div>
      </div>

      <div class="panel">
        <div class="panel-title" id="t-p-extra"></div>

        <div class="ctrl">
          <div class="ctrl-head"><span class="ctrl-label" id="t-c-pvn"></span><span class="ctrl-val" id="v-pvn"></span></div>
          <input type="range" id="pvn" min="0" max="6" step="1" value="1">
        </div>

        <div class="ctrl">
          <div class="ctrl-head"><span class="ctrl-label" id="t-c-pvp"></span><span class="ctrl-val" id="v-pvp"></span></div>
          <input type="range" id="pvp" min="800" max="3000" step="50" value="1800">
          <div class="ctrl-note" id="t-n-pv"></div>
        </div>

        <div class="ctrl">
          <div class="ctrl-head"><span class="ctrl-label" id="t-c-cop"></span><span class="ctrl-val" id="v-cop"></span></div>
          <input type="range" id="cop" min="0" max="6" step="1" value="1">
          <div class="ctrl-note" id="t-n-cop"></div>
        </div>

        <div class="ctrl">
          <div class="ctrl-head"><span class="ctrl-label" id="t-c-fund"></span><span class="ctrl-val" id="v-fund"></span></div>
          <input type="range" id="fund" min="0" max="20" step="1" value="0">
          <div class="ctrl-note" id="t-n-fund"></div>
        </div>
      </div>
    </div>

    <!-- ============ OUTPUT ============ -->
    <div>

      <div class="panel">
        <div class="panel-title" id="t-p-day"></div>
        <div class="strip-intro" id="t-strip-intro"></div>
        <div class="strip" id="strip"></div>
        <div class="strip-foot">
          <span id="t-amort-k"></span>
          <span id="t-daytotal-k"></span>
        </div>
      </div>

      <div class="panel">
        <div class="panel-title" id="t-p-ledger"></div>
        <table class="ledger">
          <tr><td id="l-rev-k"></td><td id="l-rev"></td></tr>
          <tr class="neg"><td id="l-scost-k"></td><td id="l-scost"></td></tr>
          <tr class="neg"><td id="l-tcost-k"></td><td id="l-tcost"></td></tr>
          <tr class="sum"><td id="l-net-k"></td><td id="l-net"></td></tr>
        </table>
      </div>

      <div class="panel">
        <div class="panel-title" id="t-p-month"></div>
        <table class="ledger">
          <tr><td id="m-grp-k"></td><td id="m-grp"></td></tr>
          <tr class="plus" id="row-pv"><td id="m-pv-k"></td><td id="m-pv"></td></tr>
          <tr class="plus" id="row-cop"><td id="m-cop-k"></td><td id="m-cop"></td></tr>
          <tr class="neg" id="row-fund"><td id="m-fund-k"></td><td id="m-fund"></td></tr>
          <tr class="sum"><td id="m-net-k"></td><td id="m-net"></td></tr>
        </table>
      </div>

      <div class="payout">
        <div class="payout-label" id="t-payout-k"></div>
        <div class="payout-num" id="p-month">0</div>
        <div class="payout-unit" id="p-basis"></div>
      </div>

      <div class="stats">
        <div class="stat">
          <div class="stat-k" id="t-st1-k"></div>
          <div class="stat-v good" id="st-day">0</div>
          <div class="stat-sub" id="st-day-sub"></div>
        </div>
        <div class="stat">
          <div class="stat-k" id="t-st2-k"></div>
          <div class="stat-v" id="st-be">0</div>
          <div class="stat-sub" id="st-be-sub"></div>
        </div>
        <div class="stat">
          <div class="stat-k" id="t-st3-k"></div>
          <div class="stat-v" id="st-cw">0</div>
          <div class="stat-sub" id="st-cw-sub"></div>
        </div>
        <div class="stat">
          <div class="stat-k" id="t-st4-k"></div>
          <div class="stat-v" id="st-ns">0</div>
          <div class="stat-sub" id="st-ns-sub"></div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-title" id="t-p-cmp"></div>
        <div class="cmp-row">
          <div class="cmp-k"><span id="c-a-k"></span><span id="c-a-sub"></span></div>
          <div class="cmp-v dim" id="c-a">0</div>
        </div>
        <div class="cmp-row">
          <div class="cmp-k"><span id="c-b-k"></span><span id="c-b-sub"></span></div>
          <div class="cmp-v good" id="c-b">0</div>
        </div>
        <div class="verdict" id="verdict"></div>
      </div>

    </div>
  </div>

  <div class="foot" id="t-foot"></div>
</div>

<script>
const $ = id => document.getElementById(id);
const B = n => Math.round(n).toLocaleString('en-US');
const WEEKS = 4.33;

/* ---------------- i18n ---------------- */
const T = {
  th: {
    title: 'เครื่องคำนวณกำไร คลาสมวยไทย',
    sub: 'ค่าเข้ายิมของทีมจ่ายที่ประตู วันละครั้ง ไม่ใช่คลาสละครั้ง — เลื่อน “คลาสต่อวัน” แล้วดูว่าเกิดอะไรขึ้น',
    pCore: 'ตัวแปรหลัก', pExtra: 'รายได้เสริม / หักลบ',
    pDay: 'หนึ่งวันที่ยิม', pLedger: 'บัญชี · ต่อวันที่ไปสอน', pMonth: 'บัญชี · ต่อเดือน', pCmp: 'อัดวันเดียว vs กระจายทุกวัน',

    cPrice: 'ราคาต่อคลาส', cBooked: 'คนจองต่อคลาส', cNoshow: 'จ่ายแล้วไม่มา',
    cPerday: 'คลาสต่อวัน', cDays: 'วันที่ไปยิม / สัปดาห์', cFee: 'ค่าเข้ายิม / คน', cTeam: 'คนในทีม',
    cPvn: 'Private / สัปดาห์', cPvp: 'ราคา Private', cCop: 'เหมาบริษัท / เดือน', cFund: 'กองกลาง',

    nBooked: 'เพดานจริง 10 — มีคนถือเป้าแค่ 2 คน',
    nNoshow: 'จ่ายล่วงหน้าแล้วไม่มา = เก็บเงินไว้ แถมไม่ต้องจ่ายค่าเข้า 200 ให้เขา = กำไรล้วน',
    nPerday: 'ตัวแปรที่สำคัญที่สุดในหน้านี้',
    nDays: 'อาทิตย์ปิด — สูงสุด 6',
    nFee: 'ลากไป 0 เพื่อดูว่าถ้าขอยกเว้นค่าเข้าให้ทีมได้ จะต่างแค่ไหน',
    nPv: 'จัดในวันที่มีคลาสกลุ่มอยู่แล้วเสมอ — ค่าเข้าจ่ายไปแล้ว ต้นทุนส่วนเพิ่มเป็นศูนย์',

  },

    unitB: '฿', unitP: '人', unitC: '节', unitD: '天', unitT: '次', unitPct: '%',

    roundNo: i => `第 ${i} 节`,

    st3: '团课 / 每周', st3s: n => `= 每月 ${n} 节`,
    st4: '没来的人带来的利润', st4s: '铢/月 · 白赚的钱',

    cA: '分散 —— 每天 1 节',

    vDiff: (n, d, y) => `同样上 <b>${n} 节课</b>，集中在一天多赚 <b>${d}฿/人/月</b>，一年 <b>${y}฿</b> —— 而且一节课都没多上`,

      <b>还没算进去的：</b>10 次卡用不完的部分（会把数字再往上推）· 场馆租拳套的钱 · 交通费<br>
      <b>必须确认：</b>200 的卡是不是全天有效？中途出去再进来要不要重新买？—— 如果不是，这一页所有数字都要重算`

/* ---------------- state ---------------- */
let lang = 'th';

function setLang(L) {
  lang = L;
  document.documentElement.lang = L === 'zh' ? 'zh-CN' : 'th';
  document.body.classList.toggle('zh', L === 'zh');
  $('sw-th').classList.toggle('on', L === 'th');
  $('sw-zh').classList.toggle('on', L === 'zh');
  document.title = T[L].title;
  render();
}

document.querySelectorAll('#splash .sp-btn').forEach(b => {
  b.addEventListener('click', () => { setLang(b.dataset.lang); $('splash').classList.add('gone'); });
});
$('sw-th').addEventListener('click', () => setLang('th'));
$('sw-zh').addEventListener('click', () => setLang('zh'));

/* ---------------- render ---------------- */
const ids = ['price','booked','noshow','perday','days','fee','team','pvn','pvp','cop','fund'];

function render() {
  const t = T[lang];
  const V = {};
  ids.forEach(k => V[k] = +$(k).value);

  /* --- static labels --- */
  $('t-title').textContent = t.title;
  $('t-sub').textContent   = t.sub;
  $('t-p-core').textContent   = t.pCore;
  $('t-p-extra').textContent  = t.pExtra;
  $('t-p-day').textContent    = t.pDay;
  $('t-p-ledger').textContent = t.pLedger;
  $('t-p-month').textContent  = t.pMonth;
  $('t-p-cmp').textContent    = t.pCmp;

  const L = {
    price:'cPrice', booked:'cBooked', noshow:'cNoshow', perday:'cPerday',
    days:'cDays', fee:'cFee', team:'cTeam', pvn:'cPvn', pvp:'cPvp', cop:'cCop', fund:'cFund'
  };
  Object.keys(L).forEach(k => $('t-c-' + k).textContent = t[L[k]]);

  $('t-n-booked').textContent = t.nBooked;
  $('t-n-noshow').textContent = t.nNoshow;
  $('t-n-perday').textContent = t.nPerday;
  $('t-n-days').textContent   = t.nDays;
  $('t-n-fee').textContent    = t.nFee;
  $('t-n-pv').textContent     = t.nPv;
  $('t-n-cop').textContent    = t.nCop;
  $('t-n-fund').textContent   = t.nFund;

  const u = (n, unit) => `${n}<small>${unit}</small>`;
  $('v-price').innerHTML  = u(V.price,  t.unitB);
  $('v-booked').innerHTML = u(V.booked, t.unitP);
  $('v-noshow').innerHTML = u(V.noshow, t.unitPct);
  $('v-perday').innerHTML = u(V.perday, t.unitC);
  $('v-days').innerHTML   = u(V.days,   t.unitD);
  $('v-fee').innerHTML    = u(V.fee,    t.unitB);
  $('v-team').innerHTML   = u(V.team,   t.unitP);
  $('v-pvn').innerHTML    = u(V.pvn,    t.unitT);
  $('v-pvp').innerHTML    = u(V.pvp,    t.unitB);
  $('v-cop').innerHTML    = u(V.cop,    t.unitT);
  $('v-fund').innerHTML   = u(V.fund,   t.unitPct);

  /* --- core math --- */
  const show      = 1 - V.noshow / 100;
  const attend    = V.booked * show;             // มาจริงต่อคลาส
  const gate      = V.fee * V.team;              // ค่าเข้าทีม — ต่อวัน ครั้งเดียว
  const revDay    = V.price * V.booked * V.perday;
  const sCostDay  = V.fee * attend * V.perday;
  const netDay    = revDay - sCostDay - gate;
  const perPerDay = netDay / V.team;

  const grpMonth  = netDay * V.days * WEEKS;
  const pvMonth   = V.pvn * (V.pvp - V.fee) * WEEKS;      // ลูกค้า private 1 คน, ไม่มีค่าเข้าทีมเพิ่ม
  const copMonth  = V.cop * (9000 - V.fee * 12);          // เหมา 12 คน
  const gross     = grpMonth + pvMonth + copMonth;
  const fundCut   = gross > 0 ? gross * V.fund / 100 : 0;
  const netMonth  = gross - fundCut;
  const perMonth  = netMonth / V.team;

  const margin    = V.price - V.fee;
  const beAttend  = margin > 0 ? gate / margin : Infinity;
  const amort     = gate / V.perday;
  const nsGain    = V.fee * (V.booked - attend) * V.perday * V.days * WEEKS;

  /* --- day strip : signature --- */
  let html = '';
  for (let i = 1; i <= V.perday; i++) {
    const g   = i === 1 ? gate : 0;
    const net = V.price * V.booked - V.fee * attend - g;
    html += `
      <div class="round ${i === 1 ? 'first' : ''}" style="animation-delay:${(i-1)*45}ms">
        ${i === 1 ? `<div class="gate-tag">${t.gateTag}</div>` : ''}
        <div class="round-no">${t.roundNo(i)}</div>
        <div class="round-net">${B(net)}฿</div>
        <div class="round-line">${t.roundHeads(V.booked, attend.toFixed(1))}</div>
        <div class="round-line ${i === 1 ? 'gate' : ''}">${i === 1 ? t.roundGate(B(gate)) : t.roundFree}</div>
      </div>`;
  }
  $('strip').innerHTML       = html;
  $('t-strip-intro').innerHTML = t.stripIntro(B(gate));
  $('t-amort-k').innerHTML     = t.amortK(B(amort));
  $('t-daytotal-k').innerHTML  = t.dayTotalK(B(netDay));

  /* --- daily ledger --- */
  $('l-rev-k').textContent   = t.lRevK(V.booked, V.perday, V.price);
  $('l-rev').textContent     = B(revDay);
  $('l-scost-k').textContent = t.lSK(attend.toFixed(1), V.fee);
  $('l-scost').textContent   = '−' + B(sCostDay);
  $('l-tcost-k').textContent = t.lTK(V.team, V.fee);
  $('l-tcost').textContent   = '−' + B(gate);
  $('l-net-k').textContent   = t.lNetK;
  $('l-net').textContent     = B(netDay) + ' ฿';

  /* --- monthly ledger --- */
  $('m-grp-k').textContent = t.mGrpK(V.days);
  $('m-grp').textContent   = B(grpMonth);
  $('row-pv').classList.toggle('hide', V.pvn === 0);
  $('m-pv-k').textContent  = t.mPvK(V.pvn);
  $('m-pv').textContent    = '+' + B(pvMonth);
  $('row-cop').classList.toggle('hide', V.cop === 0);
  $('m-cop-k').textContent = t.mCopK(V.cop);
  $('m-cop').textContent   = '+' + B(copMonth);
  $('row-fund').classList.toggle('hide', V.fund === 0);
  $('m-fund-k').textContent = t.mFundK(V.fund);
  $('m-fund').textContent   = '−' + B(fundCut);
  $('m-net-k').textContent  = t.mNetK;
  $('m-net').textContent    = B(netMonth) + ' ฿';

  /* --- payout + stats --- */
  $('t-payout-k').textContent = t.payoutK;
  $('p-month').textContent    = B(perMonth);
  $('p-basis').textContent    = t.payoutU(V.days, V.perday);

  $('t-st1-k').textContent   = t.st1;
  $('st-day').textContent    = B(perPerDay);
  $('st-day-sub').textContent = t.st1s(V.perday);
  $('t-st2-k').textContent   = t.st2;
  $('st-be').textContent     = beAttend === Infinity ? '—' : beAttend.toFixed(1);
  $('st-be-sub').textContent = t.st2s;
  $('t-st3-k').textContent   = t.st3;
  $('st-cw').textContent     = V.perday * V.days;
  $('st-cw-sub').textContent = t.st3s(Math.round(V.perday * V.days * WEEKS));
  $('t-st4-k').textContent   = t.st4;
  $('st-ns').textContent     = B(nsGain);
  $('st-ns-sub').textContent = t.st4s;

  /* --- compare : same classes, spread vs stacked --- */
  const totalCw    = V.perday * V.days;
  const spreadDays = Math.min(totalCw, 6);
  const spreadPer  = totalCw / spreadDays;
  const spreadDay  = V.price * V.booked * spreadPer - V.fee * attend * spreadPer - gate;
  const spreadPP   = (spreadDay * spreadDays * WEEKS) / V.team;
  const stackedPP  = grpMonth / V.team;
  const diff       = stackedPP - spreadPP;

  $('c-a-k').textContent   = t.cA;
  $('c-b-k').textContent   = t.cB(V.perday);
  $('c-a-sub').textContent = t.cASub(spreadDays, B(gate * spreadDays));
  $('c-b-sub').textContent = t.cBSub(V.days, B(gate * V.days));
  $('c-a').textContent     = B(spreadPP) + '฿';
  $('c-b').textContent     = B(stackedPP) + '฿';

  const vd = $('verdict');
  vd.classList.remove('alert');
  if (netDay < 0) { vd.classList.add('alert'); vd.innerHTML = t.vLoss; }
  else if (V.fee === 0)   vd.innerHTML = t.vFree;
  else if (V.perday === 1) vd.innerHTML = t.vOne(B(gate));
  else                     vd.innerHTML = t.vDiff(totalCw, B(diff), B(diff * 12));

  $('t-foot').innerHTML = t.foot;
}

ids.forEach(k => $(k).addEventListener('input', render));
setLang('th');
</script>
